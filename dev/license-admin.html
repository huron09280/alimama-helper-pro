<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阿里妈妈助手 - 店铺授权管理台（本地）</title>
    <style>
        :root {
            --bg: #f4f6fb;
            --panel: #ffffff;
            --text: #16202c;
            --muted: #5f6b7a;
            --line: #dce3ee;
            --brand: #2f63ff;
            --brand-soft: #ebf1ff;
            --danger: #cb2f3b;
            --danger-soft: #ffecef;
            --ok: #12875f;
            --ok-soft: #eaf8f2;
            --warn: #9b5d00;
            --warn-soft: #fff4df;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f8faff 0%, #f1f4fb 100%);
            color: var(--text);
        }

        .page {
            width: min(1400px, 96vw);
            margin: 24px auto;
            display: grid;
            gap: 14px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 4px 16px rgba(12, 31, 64, 0.06);
            padding: 14px;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .title h1 {
            margin: 0;
            font-size: 20px;
            line-height: 1.35;
        }

        .title p {
            margin: 2px 0 0;
            font-size: 13px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            gap: 10px;
        }

        .grid.cols-4 {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .grid.cols-6 {
            grid-template-columns: 1.6fr 1fr 1fr 1fr auto auto;
            align-items: end;
        }

        .grid.cols-7 {
            grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr auto auto;
            align-items: end;
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        input,
        select,
        button,
        textarea {
            font: inherit;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text);
            background: #fff;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(47, 99, 255, 0.14);
        }

        button {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text);
            font-size: 13px;
            transition: all 0.16s ease;
        }

        button:hover:not(:disabled) {
            border-color: #b7c2d4;
            transform: translateY(-1px);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .btn-primary {
            border-color: var(--brand);
            background: var(--brand);
            color: #fff;
        }

        .btn-danger {
            border-color: var(--danger);
            background: var(--danger);
            color: #fff;
        }

        .btn-soft {
            border-color: #cfd7e6;
            background: #f7f9fd;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stat {
            background: #f8fafc;
            border: 1px solid #dce3ee;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 12px;
            color: #334155;
        }

        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: auto;
            background: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1320px;
        }

        th,
        td {
            border-bottom: 1px solid #edf1f8;
            padding: 6px 8px;
            text-align: left;
            font-size: 12px;
            vertical-align: top;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f8fafd;
            z-index: 2;
            color: #3a4759;
            font-weight: 600;
        }

        tbody tr:hover {
            background: #fbfcff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            font-size: 11px;
            line-height: 1;
            padding: 5px 8px;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .badge.ok {
            color: var(--ok);
            background: var(--ok-soft);
            border-color: #c8ecd8;
        }

        .badge.off {
            color: var(--danger);
            background: var(--danger-soft);
            border-color: #ffc9d0;
        }

        .badge.warn {
            color: var(--warn);
            background: var(--warn-soft);
            border-color: #ffe1b0;
        }

        .row-actions {
            display: grid;
            grid-template-columns: repeat(3, auto);
            gap: 6px;
            margin-top: 6px;
        }

        .row-edit {
            display: grid;
            gap: 6px;
            min-width: 140px;
        }

        .row-edit-inline {
            display: block;
        }

        .shop-id-cell {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .shop-id-delete {
            width: 20px;
            height: 20px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid #ffc4cb;
            background: #fff1f3;
            color: #b9293a;
            font-size: 13px;
            line-height: 18px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateX(-2px);
            transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s ease;
        }

        tbody tr:hover .shop-id-delete,
        tbody tr:focus-within .shop-id-delete,
        .shop-id-cell:hover .shop-id-delete,
        .shop-id-delete:focus-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(0);
        }

        .shop-id-delete:hover:not(:disabled) {
            background: #ffe3e7;
            border-color: #f5a8b3;
            transform: none;
        }

        .status-edit,
        .revoke-edit {
            display: grid;
            gap: 6px;
            min-width: 122px;
        }

        .inline-menu {
            position: relative;
        }

        .inline-menu.open .inline-menu-toggle {
            border-color: #9eb6ff;
            box-shadow: 0 0 0 2px rgba(47, 99, 255, 0.12);
        }

        .inline-menu-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 5px 8px;
            font-size: 12px;
            line-height: 1.2;
            border-radius: 8px;
            border: 1px solid #d7dfed;
            background: #fff;
            color: #2b3b52;
        }

        .inline-menu-toggle.compact {
            min-width: 106px;
            padding: 0 8px;
            border-radius: 10px;
            height: 34px;
            min-height: 34px;
        }

        .state-toggle {
            width: 100%;
            min-width: 0;
            justify-content: space-between;
            gap: 6px;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            line-height: 1.2;
        }

        .state-toggle.ok {
            color: #1f6f53;
            background: #f2faf6;
            border-color: #ccead9;
        }

        .state-toggle.off {
            color: #a1303f;
            background: #fff4f6;
            border-color: #ffd5dc;
        }

        .state-toggle.warn {
            color: #8c5a10;
            background: #fff8ea;
            border-color: #ffe6bc;
        }

        .inline-menu-toggle::after {
            content: '▾';
            color: #52627b;
            font-size: 11px;
            transform-origin: center;
            transition: transform 0.14s ease;
        }

        .inline-menu.open .inline-menu-toggle::after {
            transform: rotate(180deg);
        }

        .inline-menu-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            min-width: 100%;
            width: max-content;
            max-width: 220px;
            display: grid;
            gap: 3px;
            border: 1px solid #d8e1f0;
            border-radius: 10px;
            padding: 4px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(18, 33, 60, 0.12);
            z-index: 20;
        }

        .inline-menu.menu-wide .inline-menu-panel {
            min-width: max-content;
        }

        .inline-menu-panel[hidden] {
            display: none;
        }

        .inline-menu-item {
            width: 100%;
            border: 0;
            border-radius: 7px;
            padding: 6px 8px;
            background: transparent;
            color: #23324a;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        .inline-menu-item:hover:not(:disabled) {
            background: #f2f6ff;
            transform: none;
        }

        .expiry-cell {
            display: grid;
            gap: 6px;
        }

        .expiry-editor {
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #dbe4f2;
            border-radius: 12px;
            padding: 4px;
            background: #f8fafd;
        }

        .expiry-cell input[type="date"] {
            width: 100%;
            min-width: 0;
            padding: 0 8px;
            border-radius: 10px;
            height: 34px;
            min-height: 34px;
        }

        .meta {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.55;
        }

        .pagination {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .log {
            height: 170px;
            width: 100%;
            border: 1px solid #d9e2ef;
            border-radius: 10px;
            background: #101826;
            color: #d5e0f3;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            line-height: 1.5;
            padding: 10px;
            overflow: auto;
            white-space: pre-wrap;
        }

        .tip {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.55;
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 1024px) {
            .grid.cols-4,
            .grid.cols-6,
            .grid.cols-7 {
                grid-template-columns: 1fr;
            }

            .title {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="page" id="am-license-admin-app">
        <section class="panel">
            <div class="title">
                <div>
                    <h1>店铺授权管理台（本地 HTML）</h1>
                    <p>管理“插件使用店铺”的授权状态。页面只负责管理前端，真实数据由授权服务端提供。</p>
                </div>
            </div>
        </section>

        <section class="panel grid cols-4">
            <label>
                授权服务地址（Base URL）
                <input id="baseUrlInput" placeholder="https://your-license-server.example.com" />
            </label>
            <label>
                管理员 Token（可选）
                <input id="tokenInput" placeholder="x-am-admin-token 的值（不加 Bearer）" />
            </label>
            <label>
                本地备注（仅本页显示）
                <input id="operatorInput" placeholder="例如：liangchao@team" />
            </label>
            <div class="row-actions" style="align-content: end;">
                <button id="saveSettingsBtn" class="btn-soft">保存配置</button>
                <button id="pingBtn">连通性检查</button>
                <button id="reloadBtn" class="btn-primary">刷新店铺</button>
            </div>
        </section>

        <section class="panel">
            <div class="grid cols-7">
                <label>
                    关键词（shopId / shopName）
                    <input id="keywordInput" placeholder="例如：123456789 或 店铺昵称" />
                </label>
                <label>
                    状态
                    <select id="statusSelect">
                        <option value="all">全部</option>
                        <option value="authorized">已授权</option>
                        <option value="blocked">未授权</option>
                        <option value="revoked">已吊销</option>
                        <option value="expired">已过期</option>
                    </select>
                </label>
                <label>
                    到期筛选
                    <select id="expirySelect">
                        <option value="all">全部</option>
                        <option value="expired">已过期</option>
                        <option value="not-expired">未过期</option>
                    </select>
                </label>
                <label>
                    最近活跃（小时）
                    <input id="activeWithinInput" type="number" min="0" step="1" value="0" />
                </label>
                <label>
                    每页数量
                    <select id="pageSizeSelect">
                        <option value="20">20</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                </label>
                <button id="searchBtn">查询</button>
                <button id="resetBtn">重置筛选</button>
            </div>
        </section>

        <section class="panel">
            <div class="stats" id="stats"></div>
            <div class="table-wrap" style="margin-top: 10px;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 130px;">shopId</th>
                            <th style="width: 180px;">店铺名称</th>
                            <th style="width: 88px;">授权状态</th>
                            <th style="width: 88px;">吊销状态</th>
                            <th style="width: 150px;">最近活跃</th>
                            <th style="width: 150px;">首次使用</th>
                            <th style="width: 190px;">授权到期</th>
                            <th style="width: 110px;">版本/渠道</th>
                            <th style="width: 200px;">来源与附加信息</th>
                            <th style="width: 210px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="pagination">
                <button id="prevPageBtn">上一页</button>
                <span id="pageInfo">第 1 页</span>
                <button id="nextPageBtn">下一页</button>
            </div>
        </section>

        <section class="panel">
            <div class="tip">
                当前页面已对齐阿里云线上接口：`GET /v1/license/admin/state`、`POST /v1/license/admin/allow`、
                `POST /v1/license/admin/revoke`、`POST /v1/license/admin/delete`。店铺“最近活跃”来自服务端聚合的 `verify` 命中记录。
            </div>
            <div class="log" id="logBox"></div>
        </section>
    </main>

    <script>
        (() => {
            'use strict';

            const SETTINGS_KEY = '__AM_LICENSE_ADMIN_SETTINGS_V1__';
            const DEFAULT_BASE_URL = 'https://am-licee-server-mpbzozflkj.cn-hangzhou.fcapp.run';

            const PATHS = {
                state: '/v1/license/admin/state',
                allow: '/v1/license/admin/allow',
                revoke: '/v1/license/admin/revoke',
                delete: '/v1/license/admin/delete'
            };

            const state = {
                page: 1,
                pageSize: 50,
                total: 0,
                items: [],
                allItems: [],
                generatedAt: '',
                leaseTtlMs: 0,
                defaultAuthValidDays: 3,
                adminTokenConfigured: null,
                hiddenShopIds: new Set(),
                loading: false
            };

            const dom = {
                baseUrlInput: document.getElementById('baseUrlInput'),
                tokenInput: document.getElementById('tokenInput'),
                operatorInput: document.getElementById('operatorInput'),
                saveSettingsBtn: document.getElementById('saveSettingsBtn'),
                pingBtn: document.getElementById('pingBtn'),
                reloadBtn: document.getElementById('reloadBtn'),
                keywordInput: document.getElementById('keywordInput'),
                statusSelect: document.getElementById('statusSelect'),
                expirySelect: document.getElementById('expirySelect'),
                activeWithinInput: document.getElementById('activeWithinInput'),
                pageSizeSelect: document.getElementById('pageSizeSelect'),
                searchBtn: document.getElementById('searchBtn'),
                resetBtn: document.getElementById('resetBtn'),
                stats: document.getElementById('stats'),
                tableBody: document.getElementById('tableBody'),
                prevPageBtn: document.getElementById('prevPageBtn'),
                nextPageBtn: document.getElementById('nextPageBtn'),
                pageInfo: document.getElementById('pageInfo'),
                logBox: document.getElementById('logBox')
            };

            const pad = (value) => String(value).padStart(2, '0');

            const toLocalText = (value) => {
                const ts = Date.parse(String(value || ''));
                if (!Number.isFinite(ts)) return '-';
                const date = new Date(ts);
                return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
            };

            const escapeHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

            const log = (message, type = 'info') => {
                const now = new Date();
                const stamp = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                const prefix = type === 'error' ? 'ERROR' : type === 'warn' ? 'WARN ' : 'INFO ';
                dom.logBox.textContent = `[${stamp}] [${prefix}] ${String(message || '').trim()}\n${dom.logBox.textContent || ''}`.slice(0, 12000);
            };

            const readSettings = () => {
                try {
                    const parsed = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
                    return parsed && typeof parsed === 'object' ? parsed : {};
                } catch {
                    return {};
                }
            };

            const saveSettings = () => {
                const next = {
                    baseUrl: String(dom.baseUrlInput.value || '').trim() || DEFAULT_BASE_URL,
                    token: String(dom.tokenInput.value || '').trim(),
                    operator: String(dom.operatorInput.value || '').trim()
                };
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(next));
                log('配置已保存到 localStorage');
                return next;
            };

            const getSettings = () => {
                const baseUrl = String(dom.baseUrlInput.value || '').trim() || DEFAULT_BASE_URL;
                return {
                    baseUrl: baseUrl.replace(/\/+$/, ''),
                    token: String(dom.tokenInput.value || '').trim(),
                    operator: String(dom.operatorInput.value || '').trim()
                };
            };

            const buildUrl = (path, query = null) => {
                const { baseUrl } = getSettings();
                if (!baseUrl) throw new Error('授权服务地址为空');
                const url = new URL(`${baseUrl}${path}`);
                if (query && typeof query === 'object') {
                    Object.entries(query).forEach(([key, value]) => {
                        if (value === undefined || value === null || value === '') return;
                        url.searchParams.set(key, String(value));
                    });
                }
                return url.toString();
            };

            const request = async (path, options = {}) => {
                const { token } = getSettings();
                const headers = { Accept: 'application/json' };
                if (token) {
                    headers['x-am-admin-token'] = token;
                    headers['x-admin-token'] = token;
                }
                if (options.body !== undefined) headers['Content-Type'] = 'application/json';

                const response = await fetch(buildUrl(path, options.query), {
                    method: options.method || 'GET',
                    headers,
                    body: options.body !== undefined ? JSON.stringify(options.body) : undefined,
                    credentials: 'omit'
                });

                const rawText = await response.text();
                let parsed = null;
                try {
                    parsed = rawText ? JSON.parse(rawText) : null;
                } catch {
                    parsed = null;
                }

                if (!response.ok) {
                    const message = parsed?.msg || parsed?.message || rawText || `HTTP ${response.status}`;
                    throw new Error(`请求失败: ${message}`);
                }

                return parsed || {};
            };

            const normalizeShopId = (value) => String(value || '').trim();

            const pickText = (...values) => {
                for (const value of values) {
                    const text = String(value || '').trim();
                    if (text) return text;
                }
                return '';
            };

            const pickIsoTime = (...values) => {
                for (const value of values) {
                    const text = String(value || '').trim();
                    if (!text) continue;
                    const ts = Date.parse(text);
                    if (Number.isFinite(ts)) return new Date(ts).toISOString();
                }
                return '';
            };

            const toEndOfDayIso = (dateText = '') => {
                const text = String(dateText || '').trim();
                if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return '';
                const [year, month, day] = text.split('-').map(Number);
                const date = new Date(year, month - 1, day, 23, 59, 59, 999);
                const ts = date.getTime();
                if (!Number.isFinite(ts) || ts <= Date.now()) return '';
                return date.toISOString();
            };

            const normalizeAdminState = (payload = {}) => {
                const data = payload?.data && typeof payload.data === 'object' ? payload.data : payload;
                const allowedEffective = Array.isArray(data?.allowed?.effective) ? data.allowed.effective : [];
                const revokedEffective = Array.isArray(data?.revoked?.effective) ? data.revoked.effective : [];
                const shops = Array.isArray(data?.shops) ? data.shops : [];
                const activeShops = Array.isArray(data?.activeShops) ? data.activeShops : [];

                const allowedSet = new Set(allowedEffective.map(normalizeShopId).filter(Boolean));
                const revokedSet = new Set(revokedEffective.map(normalizeShopId).filter(Boolean));
                const map = new Map();

                const ensureItem = (shopId) => {
                    if (!shopId) return null;
                    if (!map.has(shopId)) {
                        map.set(shopId, {
                            shopId,
                            shopName: '-',
                            source: '',
                            updatedAt: '',
                            lastSeenAt: '',
                            firstSeenAt: '',
                            version: '',
                            channel: '',
                            reason: '',
                            code: '',
                            browserVersion: '',
                            osVersion: '',
                            runtimeMode: '',
                            deviceHash: '',
                            authExpiresAt: '',
                            currentAuthExpiresAt: '',
                            authExpiredHint: null,
                            currentAuthExpiredHint: null,
                            enabledHint: null,
                            activeAuthorizedHint: null
                        });
                    }
                    return map.get(shopId);
                };

                const mergeItem = (shopId, patch = {}) => {
                    const item = ensureItem(shopId);
                    if (!item) return;
                    Object.entries(patch).forEach(([key, value]) => {
                        if (value === null || value === undefined) return;
                        if (typeof value === 'string') {
                            if (!value.trim()) return;
                            item[key] = value.trim();
                            return;
                        }
                        item[key] = value;
                    });
                };

                shops.forEach((entry) => {
                    const shopId = normalizeShopId(entry?.shopId || entry?.shop_id);
                    if (!shopId) return;
                    mergeItem(shopId, {
                        shopName: pickText(entry?.shopName, entry?.shop_name),
                        source: pickText(entry?.source, 'state.shops'),
                        updatedAt: pickIsoTime(entry?.updatedAt, entry?.updated_at),
                        authExpiresAt: pickIsoTime(entry?.authExpiresAt, entry?.expiresAt),
                        authExpiredHint: typeof entry?.authExpired === 'boolean' ? entry.authExpired : null,
                        enabledHint: typeof entry?.enabled === 'boolean' ? entry.enabled : null
                    });
                });

                activeShops.forEach((entry) => {
                    const shopId = normalizeShopId(entry?.shopId || entry?.shop_id);
                    if (!shopId) return;
                    mergeItem(shopId, {
                        shopName: pickText(entry?.shopName, entry?.shop_name),
                        source: pickText(entry?.source, 'state.activeShops'),
                        updatedAt: pickIsoTime(entry?.updatedAt, entry?.updated_at, entry?.lastSeenAt, entry?.activeAt),
                        lastSeenAt: pickIsoTime(entry?.lastSeenAt, entry?.activeAt, entry?.updatedAt, entry?.updated_at),
                        firstSeenAt: pickIsoTime(entry?.firstSeenAt, entry?.firstActiveAt, entry?.lastSeenAt, entry?.activeAt, entry?.updatedAt, entry?.updated_at),
                        version: pickText(entry?.scriptVersion, entry?.lastSeenVersion, entry?.version),
                        channel: pickText(entry?.buildChannel, entry?.lastSeenChannel, entry?.channel),
                        reason: pickText(entry?.reason, entry?.lastReason),
                        code: pickText(entry?.code, entry?.lastCode),
                        browserVersion: pickText(entry?.browserVersion, entry?.browser),
                        osVersion: pickText(entry?.osVersion, entry?.os),
                        runtimeMode: pickText(entry?.runtimeMode),
                        deviceHash: pickText(entry?.deviceHash),
                        currentAuthExpiresAt: pickIsoTime(entry?.currentAuthExpiresAt, entry?.authExpiresAt, entry?.expiresAt),
                        currentAuthExpiredHint: typeof entry?.currentAuthExpired === 'boolean' ? entry.currentAuthExpired : null,
                        activeAuthorizedHint: typeof entry?.authorized === 'boolean' ? entry.authorized : null
                    });
                });

                allowedSet.forEach((shopId) => ensureItem(shopId));
                revokedSet.forEach((shopId) => ensureItem(shopId));

                const items = Array.from(map.values()).map((item) => {
                    const allowed = allowedSet.has(item.shopId);
                    const revoked = revokedSet.has(item.shopId);
                    const authExpiresAt = pickIsoTime(item.authExpiresAt, item.currentAuthExpiresAt);
                    const authExpiresAtMs = Date.parse(authExpiresAt || '');
                    const authExpiredByTime = Number.isFinite(authExpiresAtMs) && authExpiresAtMs <= Date.now();
                    const authExpired = item.authExpiredHint === true || item.currentAuthExpiredHint === true || authExpiredByTime;
                    const authorized = allowed && !revoked && !authExpired;
                    return {
                        ...item,
                        authExpiresAt,
                        authExpired,
                        allowed,
                        revoked,
                        authorized
                    };
                }).sort((left, right) => {
                    const leftTs = Date.parse(left.lastSeenAt || '');
                    const rightTs = Date.parse(right.lastSeenAt || '');
                    if (Number.isFinite(leftTs) && Number.isFinite(rightTs) && leftTs !== rightTs) {
                        return rightTs - leftTs;
                    }
                    if (Number.isFinite(rightTs) && !Number.isFinite(leftTs)) return 1;
                    if (Number.isFinite(leftTs) && !Number.isFinite(rightTs)) return -1;
                    return left.shopId.localeCompare(right.shopId);
                });

                return {
                    items,
                    generatedAt: pickText(data?.generatedAt),
                    leaseTtlMs: Number(data?.leaseTtlMs || 0),
                    defaultAuthValidDays: Math.max(1, Number(data?.defaultAuthValidDays || 3)),
                    adminTokenConfigured: typeof data?.adminTokenConfigured === 'boolean' ? data.adminTokenConfigured : null
                };
            };

            const collectFilters = () => {
                const keyword = String(dom.keywordInput.value || '').trim().toLowerCase();
                const status = String(dom.statusSelect.value || 'all').trim();
                const expiry = String(dom.expirySelect.value || 'all').trim();
                const activeWithinHours = Number(dom.activeWithinInput.value || 0);
                const pageSize = Math.max(1, Number(dom.pageSizeSelect.value || 50));
                state.pageSize = pageSize;
                return {
                    keyword,
                    status,
                    expiry,
                    activeWithinHours: Number.isFinite(activeWithinHours) && activeWithinHours > 0 ? activeWithinHours : 0
                };
            };

            const applyFilters = () => {
                const { keyword, status, expiry, activeWithinHours } = collectFilters();
                const now = Date.now();

                let filtered = state.allItems.filter((item) => !state.hiddenShopIds.has(String(item.shopId || '').trim()));
                if (keyword) {
                    filtered = filtered.filter((item) => {
                        const searchableFields = [
                            item.shopId,
                            item.shopName,
                            item.source,
                            item.version,
                            item.channel,
                            item.reason,
                            item.code,
                            item.browserVersion,
                            item.osVersion,
                            item.runtimeMode,
                            item.deviceHash
                        ];
                        return searchableFields.some((value) => String(value || '').toLowerCase().includes(keyword));
                    });
                }

                if (status === 'authorized') {
                    filtered = filtered.filter(item => item.authorized);
                } else if (status === 'blocked') {
                    filtered = filtered.filter(item => !item.authorized && !item.revoked && !item.authExpired);
                } else if (status === 'revoked') {
                    filtered = filtered.filter(item => item.revoked);
                } else if (status === 'expired') {
                    filtered = filtered.filter(item => item.authExpired);
                }

                if (expiry === 'expired') {
                    filtered = filtered.filter(item => item.authExpired);
                } else if (expiry === 'not-expired') {
                    filtered = filtered.filter(item => !item.authExpired);
                }

                if (activeWithinHours > 0) {
                    const maxAge = activeWithinHours * 60 * 60 * 1000;
                    filtered = filtered.filter((item) => {
                        const ts = Date.parse(item.lastSeenAt || '');
                        return Number.isFinite(ts) && now - ts <= maxAge;
                    });
                }

                state.total = filtered.length;
                const totalPages = Math.max(1, Math.ceil(Math.max(0, state.total) / Math.max(1, state.pageSize)));
                if (state.page > totalPages) state.page = totalPages;
                if (state.page < 1) state.page = 1;

                const start = (state.page - 1) * state.pageSize;
                state.items = filtered.slice(start, start + state.pageSize);
            };

            const renderStats = () => {
                const allAuthorized = state.allItems.filter(item => item.authorized).length;
                const allRevoked = state.allItems.filter(item => item.revoked).length;
                const allExpired = state.allItems.filter(item => item.authExpired).length;
                const allBlocked = state.allItems.filter(item => !item.authorized && !item.revoked && !item.authExpired).length;
                const active24h = state.allItems.filter((item) => {
                    const ts = Date.parse(item.lastSeenAt || '');
                    return Number.isFinite(ts) && Date.now() - ts <= 24 * 60 * 60 * 1000;
                }).length;
                dom.stats.innerHTML = [
                    `<span class="stat">当前页：${state.items.length}</span>`,
                    `<span class="stat">筛选后总量：${state.total}</span>`,
                    `<span class="stat">全量店铺：${state.allItems.length}</span>`,
                    `<span class="stat">已授权：${allAuthorized}</span>`,
                    `<span class="stat">未授权：${allBlocked}</span>`,
                    `<span class="stat">已过期：${allExpired}</span>`,
                    `<span class="stat">已吊销：${allRevoked}</span>`,
                    `<span class="stat">24h 活跃：${active24h}</span>`,
                    `<span class="stat">leaseTtlMs：${Number.isFinite(state.leaseTtlMs) ? state.leaseTtlMs : 0}</span>`,
                    `<span class="stat">默认授权有效期：${Math.max(1, Number(state.defaultAuthValidDays || 3))}天</span>`,
                    `<span class="stat">adminTokenConfigured：${state.adminTokenConfigured === null ? '-' : String(state.adminTokenConfigured)}</span>`,
                    `<span class="stat">服务端时间：${state.generatedAt ? toLocalText(state.generatedAt) : '-'}</span>`
                ].join('');
            };

            const renderPagination = () => {
                const totalPages = Math.max(1, Math.ceil(Math.max(0, state.total) / Math.max(1, state.pageSize)));
                dom.pageInfo.textContent = `第 ${state.page} / ${totalPages} 页（总 ${state.total}）`;
                dom.prevPageBtn.disabled = state.loading || state.page <= 1;
                dom.nextPageBtn.disabled = state.loading || state.page >= totalPages;
            };

            const renderTable = () => {
                if (!state.items.length) {
                    const keyword = String(dom.keywordInput.value || '').trim();
                    const status = String(dom.statusSelect.value || 'all').trim();
                    const expiry = String(dom.expirySelect.value || 'all').trim();
                    const activeWithin = Number(dom.activeWithinInput.value || 0);
                    const hasFilter = !!keyword || status !== 'all' || expiry !== 'all' || (Number.isFinite(activeWithin) && activeWithin > 0);
                    const tipText = state.allItems.length > 0 && hasFilter
                        ? `当前筛选条件未命中（keyword=${keyword || '-'}，status=${status}，expiry=${expiry}，activeWithinHours=${Number.isFinite(activeWithin) ? activeWithin : 0}）。请点击“重置筛选”或将“最近活跃”设为 0。`
                        : '暂无数据。请先检查服务地址/Token，然后点击“刷新店铺”。';
                    dom.tableBody.innerHTML = `<tr><td colspan="10" class="meta">${escapeHtml(tipText)}</td></tr>`;
                    return;
                }

                dom.tableBody.innerHTML = state.items.map((item) => {
                    const authStateText = item.authorized ? '已授权' : (item.authExpired ? '已过期' : '未授权');
                    const authStateClass = item.authorized ? 'ok' : (item.authExpired ? 'warn' : 'off');
                    const revokeStateText = item.revoked ? '已吊销' : '未吊销';
                    const revokeStateClass = item.revoked ? 'warn' : 'ok';
                    const sourceText = item.source || '-';
                    const detailParts = [
                        `source: ${sourceText}`,
                        `updated: ${item.updatedAt ? toLocalText(item.updatedAt) : '-'}`,
                        `browser: ${item.browserVersion || '-'}`,
                        `os: ${item.osVersion || '-'}`,
                        `authExpired: ${item.authExpired ? 'true' : 'false'}`,
                        `reason: ${item.reason || '-'}`,
                        `code: ${item.code || '-'}`
                    ];

                    return `
                        <tr data-shop-id="${escapeHtml(item.shopId)}">
                            <td>
                                <div class="shop-id-cell">
                                    <strong>${escapeHtml(item.shopId)}</strong>
                                    <button type="button" class="shop-id-delete" data-role="delete-row-btn" title="删除当前行" aria-label="删除当前行">×</button>
                                </div>
                            </td>
                            <td>
                                <div>${escapeHtml(item.shopName || '-')}</div>
                            </td>
                            <td>
                                <div class="status-edit">
                                    <div class="inline-menu" data-role="inline-menu">
                                        <button type="button" class="inline-menu-toggle state-toggle ${authStateClass}" data-role="inline-menu-toggle" aria-expanded="false">${authStateText}</button>
                                        <div class="inline-menu-panel" data-role="inline-menu-panel" hidden>
                                            <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-on">已授权</button>
                                            <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-off">未授权</button>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div class="revoke-edit">
                                    <div class="inline-menu" data-role="inline-menu">
                                        <button type="button" class="inline-menu-toggle state-toggle ${revokeStateClass}" data-role="inline-menu-toggle" aria-expanded="false">${revokeStateText}</button>
                                        <div class="inline-menu-panel" data-role="inline-menu-panel" hidden>
                                            <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="revoke-on">已吊销</button>
                                            <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="revoke-off">未吊销</button>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div>${escapeHtml(item.lastSeenAt ? toLocalText(item.lastSeenAt) : '-')}</div>
                            </td>
                            <td>
                                <div>${escapeHtml(item.firstSeenAt ? toLocalText(item.firstSeenAt) : '-')}</div>
                            </td>
                            <td data-col="auth-expiry">
                                <div class="expiry-cell">
                                    <div class="expiry-editor">
                                        <input type="date" data-role="expiry-date-input" value="${escapeHtml(item.authExpiresAt ? item.authExpiresAt.slice(0, 10) : '')}" />
                                        <div class="inline-menu menu-wide" data-role="inline-menu">
                                            <button type="button" class="inline-menu-toggle compact" data-role="inline-menu-toggle" aria-expanded="false">授权时长</button>
                                            <div class="inline-menu-panel" data-role="inline-menu-panel" hidden>
                                                <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-on">授权（默认3天）</button>
                                                <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-1m">授权1个月</button>
                                                <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-3m">授权3个月</button>
                                                <button type="button" class="inline-menu-item" data-role="inline-menu-action" data-action="allow-1y">授权1年</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div class="meta">ver: ${escapeHtml(item.version || '-')}</div>
                                <div class="meta">channel: ${escapeHtml(item.channel || '-')}</div>
                            </td>
                            <td>
                                ${detailParts.map((line) => `<div class="meta">${escapeHtml(line)}</div>`).join('')}
                            </td>
                            <td>
                                <div class="meta">悬浮 shopId 可删当前行</div>
                            </td>
                        </tr>
                    `;
                }).join('');
            };

            const closeInlineMenus = (exceptMenu = null) => {
                dom.tableBody.querySelectorAll('[data-role="inline-menu"]').forEach((menu) => {
                    if (!(menu instanceof HTMLElement)) return;
                    if (exceptMenu && menu === exceptMenu) return;
                    const panel = menu.querySelector('[data-role="inline-menu-panel"]');
                    const toggle = menu.querySelector('[data-role="inline-menu-toggle"]');
                    if (panel instanceof HTMLElement) {
                        panel.hidden = true;
                    }
                    if (toggle instanceof HTMLButtonElement) {
                        toggle.setAttribute('aria-expanded', 'false');
                    }
                    menu.classList.remove('open');
                });
            };

            const setInlineMenuOpen = (menu, open) => {
                if (!(menu instanceof HTMLElement)) return;
                const panel = menu.querySelector('[data-role="inline-menu-panel"]');
                const toggle = menu.querySelector('[data-role="inline-menu-toggle"]');
                if (!(panel instanceof HTMLElement) || !(toggle instanceof HTMLButtonElement)) return;
                panel.hidden = !open;
                toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
                menu.classList.toggle('open', open);
            };

            const setLoading = (loading) => {
                state.loading = !!loading;
                [
                    dom.reloadBtn,
                    dom.searchBtn,
                    dom.prevPageBtn,
                    dom.nextPageBtn,
                    dom.pingBtn
                ].forEach((btn) => {
                    if (!btn) return;
                    btn.disabled = state.loading;
                });
                dom.tableBody.querySelectorAll('button[data-role="inline-menu-toggle"], button[data-role="inline-menu-action"], button[data-role="delete-row-btn"]').forEach((button) => {
                    if (button instanceof HTMLButtonElement) {
                        button.disabled = state.loading;
                    }
                });
                dom.tableBody.querySelectorAll('input[data-role="expiry-date-input"]').forEach((input) => {
                    if (input instanceof HTMLInputElement) {
                        input.disabled = state.loading;
                    }
                });
                if (state.loading) {
                    closeInlineMenus();
                }
                if (state.loading) {
                    log('加载中...');
                }
            };

            const syncStateAndRender = async () => {
                const payload = await request(PATHS.state, { method: 'GET' });
                const normalized = normalizeAdminState(payload);
                state.allItems = normalized.items;
                state.generatedAt = normalized.generatedAt;
                state.leaseTtlMs = normalized.leaseTtlMs;
                state.defaultAuthValidDays = normalized.defaultAuthValidDays;
                state.adminTokenConfigured = normalized.adminTokenConfigured;
                applyFilters();
                renderStats();
                renderTable();
                renderPagination();
                return normalized;
            };

            const loadShops = async () => {
                setLoading(true);
                try {
                    const normalized = await syncStateAndRender();
                    log(`列表刷新完成：当前页 ${state.items.length} 条，筛选后 ${state.total} 条，全量 ${state.allItems.length} 条`);
                    if (normalized.generatedAt) {
                        log(`服务端状态时间：${toLocalText(normalized.generatedAt)}`);
                    }
                } catch (error) {
                    state.allItems = [];
                    state.items = [];
                    state.total = 0;
                    state.generatedAt = '';
                    state.leaseTtlMs = 0;
                    state.defaultAuthValidDays = 3;
                    state.adminTokenConfigured = null;
                    renderStats();
                    renderTable();
                    renderPagination();
                    log(error.message || '列表刷新失败', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const callAllow = async (shopId, enabled, options = {}) => {
                const shopName = String(options.shopName || '').trim();
                const body = {
                    shopId,
                    enabled: !!enabled
                };
                if (shopName) {
                    body.shopName = shopName;
                }
                if (Object.prototype.hasOwnProperty.call(options, 'durationKey')) {
                    body.durationKey = String(options.durationKey || '').trim();
                }
                if (Object.prototype.hasOwnProperty.call(options, 'authExpiresAt')) {
                    body.authExpiresAt = options.authExpiresAt;
                }
                if (Object.prototype.hasOwnProperty.call(options, 'validDays')) {
                    body.validDays = Number(options.validDays || 0);
                }
                if (Object.prototype.hasOwnProperty.call(options, 'validMonths')) {
                    body.validMonths = Number(options.validMonths || 0);
                }
                if (Object.prototype.hasOwnProperty.call(options, 'applyDefaultExpiry')) {
                    body.applyDefaultExpiry = options.applyDefaultExpiry !== false;
                }
                return request(PATHS.allow, {
                    method: 'POST',
                    body
                });
            };

            const callRevoke = async (shopId, revoked) => {
                return request(PATHS.revoke, {
                    method: 'POST',
                    body: {
                        shopId,
                        revoked: !!revoked
                    }
                });
            };

            const callDelete = async (shopId) => {
                return request(PATHS.delete, {
                    method: 'POST',
                    body: { shopId }
                });
            };

            const runShopAction = async (shopId, actionLabel, run) => {
                if (!shopId) return false;
                let success = false;
                setLoading(true);
                try {
                    await run();
                    success = true;
                    log(`${actionLabel}成功：shopId=${shopId}`);
                    await syncStateAndRender();
                } catch (error) {
                    log(`${actionLabel}失败：shopId=${shopId}，${error.message || 'unknown_error'}`, 'error');
                } finally {
                    setLoading(false);
                }
                return success;
            };

            const executeShopAction = async (shopId, action, context = {}) => {
                if (action === 'allow-on') {
                    await runShopAction(shopId, '授权放行（默认3天）', () => callAllow(shopId, true));
                    return;
                }
                if (action === 'allow-1m') {
                    await runShopAction(shopId, '授权放行（1个月）', () => callAllow(shopId, true, { durationKey: '1m' }));
                    return;
                }
                if (action === 'allow-3m') {
                    await runShopAction(shopId, '授权放行（3个月）', () => callAllow(shopId, true, { durationKey: '3m' }));
                    return;
                }
                if (action === 'allow-1y') {
                    await runShopAction(shopId, '授权放行（1年）', () => callAllow(shopId, true, { durationKey: '1y' }));
                    return;
                }
                if (action === 'allow-permanent') {
                    await runShopAction(shopId, '授权放行（永久）', () => callAllow(shopId, true, { durationKey: 'permanent' }));
                    return;
                }
                if (action === 'set-expire-date') {
                    const dateText = String(context.expireDate || '').trim();
                    const authExpiresAt = toEndOfDayIso(dateText);
                    if (!authExpiresAt) {
                        log(`设置到期日期失败：shopId=${shopId}，请填写有效且晚于当前时间的日期`, 'warn');
                        return;
                    }
                    await runShopAction(shopId, `设置到期日期（${dateText}）`, () => callAllow(shopId, true, {
                        authExpiresAt,
                        applyDefaultExpiry: false
                    }));
                    return;
                }
                if (action === 'set-expire-permanent') {
                    await runShopAction(shopId, '设置到期日期为永久', () => callAllow(shopId, true, {
                        durationKey: 'permanent',
                        applyDefaultExpiry: false
                    }));
                    return;
                }
                if (action === 'allow-off') {
                    await runShopAction(shopId, '取消授权', () => callAllow(shopId, false));
                    return;
                }
                if (action === 'revoke-on') {
                    await runShopAction(shopId, '吊销授权', () => callRevoke(shopId, true));
                    return;
                }
                if (action === 'revoke-off') {
                    await runShopAction(shopId, '取消吊销', () => callRevoke(shopId, false));
                    return;
                }
                if (action === 'delete-row') {
                    state.hiddenShopIds.add(shopId);
                    applyFilters();
                    renderStats();
                    renderTable();
                    renderPagination();
                    const deleted = await runShopAction(shopId, '删除当前行', () => callDelete(shopId));
                    if (!deleted) {
                        state.hiddenShopIds.delete(shopId);
                        applyFilters();
                        renderStats();
                        renderTable();
                        renderPagination();
                    }
                    return;
                }
                log(`未知操作：shopId=${shopId}，action=${action || '-'}`, 'error');
            };

            const onTableClick = async (event) => {
                const target = event.target instanceof Element ? event.target : null;
                if (!target) return;
                const deleteButton = target.closest('button[data-role="delete-row-btn"]');
                if (deleteButton instanceof HTMLButtonElement) {
                    event.preventDefault();
                    event.stopPropagation();
                    if (state.loading) return;
                    const row = deleteButton.closest('tr[data-shop-id]');
                    const shopId = String(row?.dataset.shopId || '').trim();
                    if (!row || !shopId) return;
                    closeInlineMenus();
                    await executeShopAction(shopId, 'delete-row');
                    return;
                }
                const menuToggle = target.closest('button[data-role="inline-menu-toggle"]');
                if (menuToggle instanceof HTMLButtonElement) {
                    event.preventDefault();
                    event.stopPropagation();
                    if (state.loading) return;
                    const menu = menuToggle.closest('[data-role="inline-menu"]');
                    if (!(menu instanceof HTMLElement)) return;
                    const isOpen = menu.classList.contains('open');
                    closeInlineMenus(menu);
                    setInlineMenuOpen(menu, !isOpen);
                    return;
                }
                const menuActionButton = target.closest('button[data-role="inline-menu-action"]');
                if (menuActionButton instanceof HTMLButtonElement) {
                    event.preventDefault();
                    event.stopPropagation();
                    if (state.loading) return;
                    const action = String(menuActionButton.dataset.action || '').trim();
                    if (!action) return;
                    const row = menuActionButton.closest('tr[data-shop-id]');
                    const shopId = String(row?.dataset.shopId || '').trim();
                    if (!row || !shopId) return;
                    closeInlineMenus();
                    await executeShopAction(shopId, action);
                    return;
                }
            };

            const onTableChange = async (event) => {
                const dateInput = event.target instanceof HTMLInputElement && event.target.matches('input[data-role="expiry-date-input"]')
                    ? event.target
                    : null;
                if (dateInput) {
                    const row = dateInput.closest('tr[data-shop-id]');
                    const shopId = String(row?.dataset.shopId || '').trim();
                    const expireDate = String(dateInput.value || '').trim();
                    if (!row || !shopId || !expireDate) return;
                    await executeShopAction(shopId, 'set-expire-date', { expireDate });
                }
            };

            const pingServer = async () => {
                setLoading(true);
                try {
                    const payload = await request(PATHS.state, { method: 'GET' });
                    const normalized = normalizeAdminState(payload);
                    log(`连通性检查通过：shops=${normalized.items.length} generatedAt=${normalized.generatedAt || '-'}`);
                } catch (error) {
                    log(`连通性检查失败：${error.message || 'unknown_error'}`, 'error');
                } finally {
                    setLoading(false);
                }
            };

            const bindEvents = () => {
                const applyLocalFilters = () => {
                    state.page = 1;
                    applyFilters();
                    renderStats();
                    renderTable();
                    renderPagination();
                };

                dom.saveSettingsBtn.addEventListener('click', () => {
                    saveSettings();
                });

                dom.reloadBtn.addEventListener('click', () => {
                    state.page = 1;
                    loadShops();
                });

                dom.searchBtn.addEventListener('click', () => {
                    state.page = 1;
                    loadShops();
                });

                dom.resetBtn.addEventListener('click', () => {
                    dom.keywordInput.value = '';
                    dom.statusSelect.value = 'all';
                    dom.expirySelect.value = 'all';
                    dom.activeWithinInput.value = '0';
                    dom.pageSizeSelect.value = '50';
                    state.page = 1;
                    loadShops();
                });

                dom.prevPageBtn.addEventListener('click', () => {
                    if (state.page <= 1) return;
                    state.page -= 1;
                    applyFilters();
                    renderStats();
                    renderTable();
                    renderPagination();
                });

                dom.nextPageBtn.addEventListener('click', () => {
                    const totalPages = Math.max(1, Math.ceil(Math.max(0, state.total) / Math.max(1, state.pageSize)));
                    if (state.page >= totalPages) return;
                    state.page += 1;
                    applyFilters();
                    renderStats();
                    renderTable();
                    renderPagination();
                });

                dom.pingBtn.addEventListener('click', pingServer);
                dom.keywordInput.addEventListener('input', applyLocalFilters);
                dom.statusSelect.addEventListener('change', applyLocalFilters);
                dom.expirySelect.addEventListener('change', applyLocalFilters);
                dom.activeWithinInput.addEventListener('input', applyLocalFilters);
                dom.tableBody.addEventListener('click', onTableClick);
                dom.tableBody.addEventListener('change', onTableChange);
                document.addEventListener('click', (event) => {
                    const target = event.target instanceof Element ? event.target : null;
                    if (!target) return;
                    if (target.closest('[data-role="inline-menu"]')) return;
                    closeInlineMenus();
                });
                dom.pageSizeSelect.addEventListener('change', () => {
                    state.page = 1;
                    applyFilters();
                    renderStats();
                    renderTable();
                    renderPagination();
                });
            };

            const boot = () => {
                const settings = readSettings();
                dom.baseUrlInput.value = String(settings.baseUrl || DEFAULT_BASE_URL);
                dom.tokenInput.value = String(settings.token || '');
                dom.operatorInput.value = String(settings.operator || '');
                dom.pageSizeSelect.value = '50';
                bindEvents();
                renderStats();
                renderTable();
                renderPagination();
                log('管理页已启动。请先确认授权服务地址与管理员 token（x-am-admin-token）。');
                loadShops();
            };

            boot();
        })();
    </script>
</body>
</html>
