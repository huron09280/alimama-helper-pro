name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify script
        run: bash scripts/review-team.sh

      - name: Build release assets
        run: node scripts/build.mjs

      - name: Archive extension package
        run: |
          python3 <<'PY'
          from pathlib import Path
          import zipfile

          ext_dir = Path('dist/extension')
          out_path = Path('dist/packages/alimama-helper-pro-extension.zip')
          out_path.parent.mkdir(parents=True, exist_ok=True)

          with zipfile.ZipFile(out_path, 'w', zipfile.ZIP_DEFLATED) as zf:
              for file in sorted(ext_dir.rglob('*')):
                  if file.is_file():
                      zf.write(file, file.relative_to(ext_dir))
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/packages/alimama-helper-pro.user.js
            dist/packages/alimama-helper-pro.meta.js
            dist/packages/alimama-helper-pro-extension.zip
